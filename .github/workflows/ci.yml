name: CI

on:
  pull_request:
  push:
    branches: [main]

defaults:
  run:
    working-directory: labradog-app

jobs:
  lint-y-tests:
    name: Lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: labradog-app/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Tests unitarios
        run: npm run test
